---
# FreeBSD 14 CIS Benchmark v1.0.1 — Role Defaults

# Set to true to apply remediation for non-compliant controls.
# Default is false (audit-only mode).
freebsd_cis_remediate: false

# CIS profile level. Level 1 is the minimum; Level 2 includes all Level 1 controls.
# Level 2 controls address higher-risk environments and may have operational impact.
freebsd_cis_level: 1

# Rule IDs to skip globally (defined at the role level).
# Example: ["1.1.1.1", "3.2.1"]
freebsd_cis_global_exceptions: []

# Rule IDs to skip locally (defined at the playbook or host level).
# Example: ["4.2.19"]
freebsd_cis_local_exceptions: []

# -------------------------------------------------------------------
# Section 1 — Initial Setup
# -------------------------------------------------------------------

# 1.1.2.1.1 — tmpfs size for /tmp when enabling tmpfs via sysrc.
freebsd_cis_tmp_size: "2g"

# 1.3.1 — Bootloader password written to /boot/loader.conf.
# WARNING: FreeBSD's loader stores this value in PLAINTEXT.
# Leave empty ("") to skip bootloader password remediation.
freebsd_cis_bootloader_password: ""

# 1.6.1 / 1.6.2 / 1.6.3 — Warning banner text used for /etc/motd,
# /etc/issue, and /etc/issue.net. Customize per site policy and legal review.
freebsd_cis_warning_banner: >-
  Authorized users only. All activity may be monitored and reported.

# -------------------------------------------------------------------
# Section 4 — Access, Authentication and Authorization
# -------------------------------------------------------------------

# 4.2.x — SSH implementation selector.
# 'base'  — FreeBSD base system sshd  (default)
# 'ports' — OpenSSH installed from ports/packages
# Setting this automatically derives the four variables below.
# Override any of them individually if your layout differs from standard paths.
freebsd_cis_sshd_source: base

# 4.2.x — Path to sshd_config.
freebsd_cis_sshd_config: >-
  {{ '/usr/local/etc/ssh/sshd_config' if freebsd_cis_sshd_source == 'ports'
     else '/etc/ssh/sshd_config' }}

# 4.2.x — Path to the sshd binary used for configuration test/query (-T flag).
freebsd_cis_sshd_bin: >-
  {{ '/usr/local/sbin/sshd' if freebsd_cis_sshd_source == 'ports'
     else '/usr/sbin/sshd' }}

# 4.2.x — Path to the ssh binary (used for version checks if needed).
freebsd_cis_ssh_bin: >-
  {{ '/usr/local/bin/ssh' if freebsd_cis_sshd_source == 'ports'
     else '/usr/bin/ssh' }}

# 4.2.x — rc.d service name for sshd reload.
# FreeBSD base: sshd  |  Ports OpenSSH: openssh
freebsd_cis_sshd_service: >-
  {{ 'openssh' if freebsd_cis_sshd_source == 'ports'
     else 'sshd' }}

# 4.2.4 — sshd access restriction (AllowUsers / AllowGroups / DenyUsers / DenyGroups).
# Set at least one to a non-empty string to enable automated remediation.
# Leave all empty to skip the remediation task (the audit will still run).
freebsd_cis_sshd_allow_users: ""
freebsd_cis_sshd_allow_groups: ""
freebsd_cis_sshd_deny_users: ""
freebsd_cis_sshd_deny_groups: ""

# 4.2.5 — Banner file path sent to remote users before authentication.
freebsd_cis_sshd_banner: /etc/issue.net

# 4.2.6 — Comma-separated list of weak ciphers to remove (minus-prefix syntax).
freebsd_cis_sshd_weak_ciphers: "3des-cbc,aes128-cbc,aes192-cbc,aes256-cbc,rijndael-cbc@lysator.liu.se"

# 4.2.7 — Idle connection timeout. ClientAliveInterval must be > 0; CountMax must be > 0.
freebsd_cis_sshd_client_alive_interval: 15
freebsd_cis_sshd_client_alive_count_max: 3

# 4.2.11 — Comma-separated list of weak key-exchange algorithms to remove.
freebsd_cis_sshd_weak_kex: "diffie-hellman-group1-sha1,diffie-hellman-group14-sha1,diffie-hellman-group-exchange-sha1"

# 4.2.12 — Maximum seconds allowed for successful authentication (1-60 or 1m).
freebsd_cis_sshd_login_grace_time: 60

# 4.2.13 — sshd log verbosity (VERBOSE or INFO).
freebsd_cis_sshd_log_level: "VERBOSE"

# 4.2.14 — Comma-separated list of weak MAC algorithms to remove.
freebsd_cis_sshd_weak_macs: >-
  hmac-md5,hmac-md5-96,hmac-ripemd160,hmac-sha1-96,umac-64@openssh.com,hmac-md5-etm@openssh.com,hmac-md5-96-etm@openssh.com,hmac-ripemd160-etm@openssh.com,hmac-sha1-96-etm@openssh.com,umac-64-etm@openssh.com

# 4.2.15 — Maximum authentication attempts per connection (benchmark recommends 4).
freebsd_cis_sshd_max_auth_tries: 4

# 4.2.16 — Maximum open sessions per connection (benchmark requires <= 10).
freebsd_cis_sshd_max_sessions: 10

# 4.2.17 — MaxStartups throttle: start:rate:full (benchmark recommends 10:30:60).
freebsd_cis_sshd_max_startups: "10:30:60"

# -------------------------------------------------------------------
# Section 4.3 — sudo / privilege escalation
# -------------------------------------------------------------------

# 4.3.3 — Path for the sudo log file.
freebsd_cis_sudo_logfile: /var/log/sudo.log

# 4.3.6 — sudo credential cache timeout in minutes (1–15).
# A value of -1 disables the timeout (non-compliant). Default sudo value is 5.
freebsd_cis_sudo_timeout: 15

# -------------------------------------------------------------------
# Section 4.4 — PAM
# -------------------------------------------------------------------

# 4.4.1.1.1 / 4.4.1.1.2 — pam_passwdqc minlen argument string.
# Format: disabled,N1,N2,N3,N4 (see pam_passwdqc(8)).
# N1 must be >= 14 per CIS benchmark.
freebsd_cis_pam_passwdqc_minlen: "disabled,14,12,8,6"  # pragma: allowlist secret

# -------------------------------------------------------------------
# Section 4.5 — User accounts and environment
# -------------------------------------------------------------------

# 4.5.1.2 — Maximum password age in days (<= 365).
freebsd_cis_pw_max_age: 365

# 4.5.1.3 — Password expiration warning in days (>= 7).
freebsd_cis_pw_warn_days: 7

# -------------------------------------------------------------------
# Section 5 — Logging and Auditing
# -------------------------------------------------------------------

# 5.1.1.5 — FQDN or IP of the remote syslog host used for syslog.conf remediation.
# The audit always runs and detects any remote logging mechanism (syslog @remote
# entries, Splunk Universal Forwarder, rsyslog, syslog-ng).
# This variable only controls whether automated remediation adds a syslog.conf
# forwarding entry. Leave empty ("") when remote logging is handled by another
# mechanism (e.g. Splunk UF) and no syslog.conf change is needed.
freebsd_cis_syslog_remote_host: ""

# 5.1.3 — List of log files to enforce 0640 root:wheel or more restrictive on during remediation.
# Extend or override as appropriate for your environment.
freebsd_cis_log_files_to_fix:
  - /var/log/messages
  - /var/log/cron
  - /var/log/auth.log
  - /var/log/maillog
  - /var/log/security
  - /var/log/debug.log

# 5.2.2.1 — Maximum audit trail file size before rotation.
# Supports B, K, M, G suffixes. Default: 2M.
freebsd_cis_audit_filesz: "2M"

# 5.2.2.2 — Minimum age/size before audit logs expire.
# Supports age (e.g. 60d, 1y) and/or size (e.g. 512M, 2G) with AND/OR conjunction.
# SECURITY: A size-only default below 100 MB is dangerous — on a busy or actively probed
# host, BSM audit logs can exceed that threshold within minutes, causing auditd to purge
# forensic evidence before it is forwarded or reviewed. The default uses an age+size
# conjunction so logs are retained for at least 60 days AND 512 MB has accumulated.
# Tune this value to fit your retention and disk-space requirements; avoid small
# size-only values unless you have a forwarding pipeline confirmed to be running.
freebsd_cis_audit_expire_after: "60d and 512M"
