# =============================================================
# 5.2.4 Configure auditd file access
# =============================================================

- name: "5.2.4.1 | Ensure the audit log directory is 0750 or more restrictive"
  when:
    - "'5.2.4.1' not in active_exceptions"
    - freebsd_cis_level | int >= 2
  tags: [rule_5.2.4.1, level2, section_5, manual]
  block:
    - name: "5.2.4.1 | AUDIT | Get audit log directory path"
      ansible.builtin.shell: "awk -F: '/^dir/ {print $2}' /etc/security/audit_control"
      register: cis_5_2_4_1_dir
      changed_when: false
      failed_when: false
      check_mode: false

    - name: "5.2.4.1 | AUDIT | Check audit log directory permissions"
      ansible.builtin.stat:
        path: "{{ cis_5_2_4_1_dir.stdout | trim }}"
      register: cis_5_2_4_1_stat
      check_mode: false
      when: cis_5_2_4_1_dir.stdout | trim != ''

    - name: "5.2.4.1 | AUDIT | Report audit log directory not found"
      ansible.builtin.debug:
        msg: "NON-COMPLIANT: could not determine audit log directory from audit_control"
      when: cis_5_2_4_1_dir.stdout | trim == ''

    - name: "5.2.4.1 | AUDIT | Report audit log directory permissions"
      ansible.builtin.debug:
        msg: >-
          {{ 'COMPLIANT: ' ~ cis_5_2_4_1_dir.stdout | trim ~ ' has mode '
             ~ cis_5_2_4_1_stat.stat.mode ~ ' (0750 or more restrictive)'
             if (cis_5_2_4_1_stat.stat.mode | string) <= '0750'
             else 'NON-COMPLIANT: ' ~ cis_5_2_4_1_dir.stdout | trim
                  ~ ' has mode ' ~ cis_5_2_4_1_stat.stat.mode
                  ~ ' — must be 0750 or more restrictive' }}
      when:
        - cis_5_2_4_1_dir.stdout | trim != ''
        - cis_5_2_4_1_stat is defined

    - name: "5.2.4.1 | REMEDIATE | Set audit log directory to 0750"
      ansible.builtin.file:
        path: "{{ cis_5_2_4_1_dir.stdout | trim }}"
        mode: 'g-w,o-rwx'
      when:
        - freebsd_cis_remediate | bool
        - cis_5_2_4_1_dir.stdout | trim != ''
        - cis_5_2_4_1_stat is defined
        - (cis_5_2_4_1_stat.stat.mode | string) > '0750'

# ---

- name: "5.2.4.2 | Ensure audit log files are mode 0640 or less permissive"
  when:
    - "'5.2.4.2' not in active_exceptions"
    - freebsd_cis_level | int >= 2
  tags: [rule_5.2.4.2, level2, section_5, manual]
  block:
    - name: "5.2.4.2 | AUDIT | Get audit log directory path"
      ansible.builtin.shell: "awk -F: '/^dir/ {print $2}' /etc/security/audit_control"
      register: cis_5_2_4_2_dir
      changed_when: false
      failed_when: false
      check_mode: false

    - name: "5.2.4.2 | AUDIT | Find over-permissive audit log files"  # noqa: risky-shell-pipe
      ansible.builtin.shell: >-
        find "{{ cis_5_2_4_2_dir.stdout | trim }}" -type f
        \( ! -perm 600 -a ! -perm 0400 -a ! -perm 0200 -a ! -perm 0000
           -a ! -perm 0640 -a ! -perm 0440 -a ! -perm 0040 \)
        -exec stat -Lf "%N %Lp" {} + 2>/dev/null | head -20 || true
      register: cis_5_2_4_2_files
      changed_when: cis_5_2_4_2_files.stdout | trim != ''
      failed_when: false
      check_mode: false
      when: cis_5_2_4_2_dir.stdout | trim != ''

    - name: "5.2.4.2 | AUDIT | Report audit log file permissions"
      ansible.builtin.debug:
        msg: >-
          {{ 'COMPLIANT: all audit log files are 0640 or more restrictive'
             if (cis_5_2_4_2_files.stdout | default('')) | trim == ''
             else 'NON-COMPLIANT: over-permissive audit log files found' }}

    - name: "5.2.4.2 | AUDIT | Show over-permissive audit log files"
      ansible.builtin.debug:
        msg: "{{ ['Over-permissive audit log files:'] + cis_5_2_4_2_files.stdout_lines }}"
      when: (cis_5_2_4_2_files.stdout | default('')) | trim != ''

    - name: "5.2.4.2 | REMEDIATE | Fix over-permissive audit log file modes"
      ansible.builtin.shell: >-
        find "{{ cis_5_2_4_2_dir.stdout | trim }}" -type f
        \( ! -perm 600 -a ! -perm 0400 -a ! -perm 0200 -a ! -perm 0000
           -a ! -perm 0640 -a ! -perm 0440 -a ! -perm 0040 \)
        -exec chmod u-x,g-wx,o-rwx {} + 2>/dev/null || true
      when:
        - freebsd_cis_remediate | bool
        - cis_5_2_4_2_dir.stdout | trim != ''
        - (cis_5_2_4_2_files.stdout | default('')) | trim != ''
      changed_when: true

# ---

- name: "5.2.4.3 | Ensure only authorized users own audit log files"
  when:
    - "'5.2.4.3' not in active_exceptions"
    - freebsd_cis_level | int >= 2
  tags: [rule_5.2.4.3, level2, section_5, manual]
  block:
    - name: "5.2.4.3 | AUDIT | Get audit log directory path"
      ansible.builtin.shell: "awk -F: '/^dir/ {print $2}' /etc/security/audit_control"
      register: cis_5_2_4_3_dir
      changed_when: false
      failed_when: false
      check_mode: false

    - name: "5.2.4.3 | AUDIT | Find non-root-owned audit log files"  # noqa: risky-shell-pipe
      ansible.builtin.shell: >-
        find "{{ cis_5_2_4_3_dir.stdout | trim }}" -type f ! -user root
        -exec stat -Lf "%N %Su" {} + 2>/dev/null | head -20 || true
      register: cis_5_2_4_3_owner
      changed_when: cis_5_2_4_3_owner.stdout | trim != ''
      failed_when: false
      check_mode: false
      when: cis_5_2_4_3_dir.stdout | trim != ''

    - name: "5.2.4.3 | AUDIT | Report audit log file ownership"
      ansible.builtin.debug:
        msg: >-
          {{ 'COMPLIANT: all audit log files are owned by root'
             if (cis_5_2_4_3_owner.stdout | default('')) | trim == ''
             else 'NON-COMPLIANT: audit log files found not owned by root' }}

    - name: "5.2.4.3 | REMEDIATE | Fix non-root-owned audit log files"
      ansible.builtin.shell: >-
        find "{{ cis_5_2_4_3_dir.stdout | trim }}" -type f ! -user root
        -exec chown root {} + 2>/dev/null || true
      when:
        - freebsd_cis_remediate | bool
        - cis_5_2_4_3_dir.stdout | trim != ''
        - (cis_5_2_4_3_owner.stdout | default('')) | trim != ''
      changed_when: true

# ---

- name: "5.2.4.4 | Ensure only authorized groups are assigned ownership of audit log files"
  when:
    - "'5.2.4.4' not in active_exceptions"
    - freebsd_cis_level | int >= 2
  tags: [rule_5.2.4.4, level2, section_5, manual]
  block:
    - name: "5.2.4.4 | AUDIT | Get audit log directory path"
      ansible.builtin.shell: "awk -F: '/^dir/ {print $2}' /etc/security/audit_control"
      register: cis_5_2_4_4_dir
      changed_when: false
      failed_when: false
      check_mode: false

    - name: "5.2.4.4 | AUDIT | Find audit log files with wrong group"  # noqa: risky-shell-pipe
      ansible.builtin.shell: >-
        stat -L -f "%Sg" "{{ cis_5_2_4_4_dir.stdout | trim }}"/* 2>/dev/null
        | grep -Ev '^(audit|wheel)' | head -20 || true
      register: cis_5_2_4_4_group
      changed_when: cis_5_2_4_4_group.stdout | trim != ''
      failed_when: false
      check_mode: false
      when: cis_5_2_4_4_dir.stdout | trim != ''

    - name: "5.2.4.4 | AUDIT | Report audit log file group ownership"
      ansible.builtin.debug:
        msg: >-
          {{ 'COMPLIANT: all audit log files belong to audit or wheel group'
             if (cis_5_2_4_4_group.stdout | default('')) | trim == ''
             else 'NON-COMPLIANT: audit log files found with unauthorized group ownership' }}

    - name: "5.2.4.4 | REMEDIATE | Set audit log files and directory group to audit"
      ansible.builtin.shell: >-
        find "{{ cis_5_2_4_4_dir.stdout | trim }}" \( -type f -o -type d \)
        ! -group audit ! -group wheel -exec chgrp audit {} + 2>/dev/null || true
      when:
        - freebsd_cis_remediate | bool
        - cis_5_2_4_4_dir.stdout | trim != ''
        - (cis_5_2_4_4_group.stdout | default('')) | trim != ''
      changed_when: true

# ---

- name: "5.2.4.5 | Ensure audit configuration files are restrictive"
  when:
    - "'5.2.4.5' not in active_exceptions"
    - freebsd_cis_level | int >= 2
  tags: [rule_5.2.4.5, level2, section_5, manual]
  block:
    - name: "5.2.4.5 | AUDIT | Check audit_warn mode"
      ansible.builtin.stat:
        path: /etc/security/audit_warn
      register: cis_5_2_4_5_warn
      check_mode: false

    - name: "5.2.4.5 | AUDIT | Check audit_control and audit_user modes"  # noqa: risky-shell-pipe
      ansible.builtin.shell: >-
        stat -Lf '%N %Lp' /etc/security/audit_control /etc/security/audit_user 2>/dev/null
        | grep -Ev -- '^[[:space:]]*[^[:space:]]+[[:space:]]+600[[:space:]]*$' | head -10 || true
      register: cis_5_2_4_5_control
      changed_when: cis_5_2_4_5_control.stdout | trim != ''
      failed_when: false
      check_mode: false

    - name: "5.2.4.5 | AUDIT | Check audit_event and audit_class modes"  # noqa: risky-shell-pipe
      ansible.builtin.shell: >-
        stat -Lf '%N %Lp' /etc/security/audit_event /etc/security/audit_class 2>/dev/null
        | grep -Ev -- '^[[:space:]]*[^[:space:]]+[[:space:]]+444[[:space:]]*$' | head -10 || true
      register: cis_5_2_4_5_class
      changed_when: cis_5_2_4_5_class.stdout | trim != ''
      failed_when: false
      check_mode: false

    - name: "5.2.4.5 | AUDIT | Report audit config file permissions"
      ansible.builtin.debug:
        msg: >-
          {{ 'COMPLIANT: audit configuration files have correct modes'
             if (cis_5_2_4_5_control.stdout | trim == '') and
                (cis_5_2_4_5_class.stdout | trim == '') and
                (not cis_5_2_4_5_warn.stat.exists or
                 cis_5_2_4_5_warn.stat.mode == '0500')
             else 'NON-COMPLIANT: audit configuration files have incorrect modes — review details' }}

    - name: "5.2.4.5 | AUDIT | Show control/user mismatches"
      ansible.builtin.debug:
        msg: "{{ ['Files with incorrect mode (expected 600):'] + cis_5_2_4_5_control.stdout_lines }}"
      when: cis_5_2_4_5_control.stdout | trim != ''

    - name: "5.2.4.5 | AUDIT | Show event/class mismatches"
      ansible.builtin.debug:
        msg: "{{ ['Files with incorrect mode (expected 444):'] + cis_5_2_4_5_class.stdout_lines }}"
      when: cis_5_2_4_5_class.stdout | trim != ''

    - name: "5.2.4.5 | REMEDIATE | Set audit_event and audit_class to 444"
      ansible.builtin.file:
        path: "{{ item }}"
        mode: '0444'
      loop:
        - /etc/security/audit_event
        - /etc/security/audit_class
      when:
        - freebsd_cis_remediate | bool
        - cis_5_2_4_5_class.stdout | trim != ''

    - name: "5.2.4.5 | REMEDIATE | Set audit_warn to 500"
      ansible.builtin.file:
        path: /etc/security/audit_warn
        mode: '0500'
      when:
        - freebsd_cis_remediate | bool
        - cis_5_2_4_5_warn.stat.exists
        - (cis_5_2_4_5_warn.stat.mode | default('0500')) != '0500'

    - name: "5.2.4.5 | REMEDIATE | Set audit_control and audit_user to 600"
      ansible.builtin.file:
        path: "{{ item }}"
        mode: '0600'
      loop:
        - /etc/security/audit_control
        - /etc/security/audit_user
      when:
        - freebsd_cis_remediate | bool
        - cis_5_2_4_5_control.stdout | trim != ''

# ---

- name: "5.2.4.6 | Ensure audit configuration files are owned by root"
  when:
    - "'5.2.4.6' not in active_exceptions"
    - freebsd_cis_level | int >= 2
  tags: [rule_5.2.4.6, level2, section_5, manual]
  block:
    - name: "5.2.4.6 | AUDIT | Find audit config files not owned by root"  # noqa: risky-shell-pipe
      ansible.builtin.shell: >-
        find /etc/security -type f -name 'audit*' ! -user root 2>/dev/null | head -10 || true
      register: cis_5_2_4_6_owner
      changed_when: cis_5_2_4_6_owner.stdout | trim != ''
      failed_when: false
      check_mode: false

    - name: "5.2.4.6 | AUDIT | Report audit config file ownership"
      ansible.builtin.debug:
        msg: >-
          {{ 'COMPLIANT: all audit configuration files are owned by root'
             if cis_5_2_4_6_owner.stdout | trim == ''
             else 'NON-COMPLIANT: audit config files not owned by root: ' ~ cis_5_2_4_6_owner.stdout }}

    - name: "5.2.4.6 | REMEDIATE | Fix audit config file ownership"
      ansible.builtin.shell: >-
        find /etc/security -type f -name 'audit*' ! -user root -exec chown root {} + 2>/dev/null || true
      when:
        - freebsd_cis_remediate | bool
        - cis_5_2_4_6_owner.stdout | trim != ''
      changed_when: true

# ---

- name: "5.2.4.7 | Ensure audit configuration files belong to group wheel"
  when:
    - "'5.2.4.7' not in active_exceptions"
    - freebsd_cis_level | int >= 2
  tags: [rule_5.2.4.7, level2, section_5, manual]
  block:
