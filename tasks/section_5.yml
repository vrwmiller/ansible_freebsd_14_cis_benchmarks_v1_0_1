      ansible.builtin.shell: >-
        find /etc/security -type f -name 'audit*' ! -group wheel 2>/dev/null | head -10 || true
      register: cis_5_2_4_7_group
      changed_when: cis_5_2_4_7_group.stdout | trim != ''
      failed_when: false
      check_mode: false

    - name: "5.2.4.7 | AUDIT | Report audit config file group"
      ansible.builtin.debug:
        msg: >-
          {{ 'COMPLIANT: all audit configuration files belong to group wheel'
             if cis_5_2_4_7_group.stdout | trim == ''
             else 'NON-COMPLIANT: audit config files not in group wheel: ' ~ cis_5_2_4_7_group.stdout }}

    - name: "5.2.4.7 | REMEDIATE | Fix audit config file group"
      ansible.builtin.shell: >-
        find /etc/security -type f -name 'audit*' ! -group wheel -exec chgrp wheel {} + 2>/dev/null || true
      when:
        - freebsd_cis_remediate | bool
        - cis_5_2_4_7_group.stdout | trim != ''
      changed_when: true

# ---

- name: "5.2.4.8 | Ensure audit tools are 555 or more restrictive"
  when:
    - "'5.2.4.8' not in active_exceptions"
    - freebsd_cis_level | int >= 2
  tags: [rule_5.2.4.8, level2, section_5, manual]
  block:
    - name: "5.2.4.8 | AUDIT | Check audit tool modes"  # noqa: risky-shell-pipe
      ansible.builtin.shell: >-
        stat -Lf '%N %Lp' /usr/sbin/*audit* 2>/dev/null
        | grep -Ev -- '^[[:space:]]*[^[:space:]]+[[:space:]]+([0-5][0145][0145])[[:space:]]*$' | head -10 || true
      register: cis_5_2_4_8_mode
      changed_when: cis_5_2_4_8_mode.stdout | trim != ''
      failed_when: false
      check_mode: false

    - name: "5.2.4.8 | AUDIT | Report audit tool modes"
      ansible.builtin.debug:
        msg: >-
          {{ 'COMPLIANT: all audit tools are 555 or more restrictive'
             if cis_5_2_4_8_mode.stdout | trim == ''
             else 'NON-COMPLIANT: audit tools with over-permissive mode found' }}

    - name: "5.2.4.8 | REMEDIATE | Remove write bits from over-permissive audit tools"
      ansible.builtin.shell: chmod a-w /usr/sbin/*audit* 2>/dev/null || true
      when:
        - freebsd_cis_remediate | bool
        - cis_5_2_4_8_mode.stdout | trim != ''
      changed_when: true

# ---

- name: "5.2.4.9 | Ensure audit tools are owned by root"
  when:
    - "'5.2.4.9' not in active_exceptions"
    - freebsd_cis_level | int >= 2
  tags: [rule_5.2.4.9, level2, section_5, manual]
  block:
    - name: "5.2.4.9 | AUDIT | Find audit tools not owned by root"  # noqa: risky-shell-pipe
      ansible.builtin.shell: >-
        stat -Lf '%N %Su' /usr/sbin/*audit* 2>/dev/null
        | grep -Ev -- '^[[:space:]]*[^[:space:]]+[[:space:]]+root[[:space:]]*$' | head -10 || true
      register: cis_5_2_4_9_owner
      changed_when: cis_5_2_4_9_owner.stdout | trim != ''
      failed_when: false
      check_mode: false

    - name: "5.2.4.9 | AUDIT | Report audit tool ownership"
      ansible.builtin.debug:
        msg: >-
          {{ 'COMPLIANT: all audit tools are owned by root'
             if cis_5_2_4_9_owner.stdout | trim == ''
             else 'NON-COMPLIANT: audit tools not owned by root: ' ~ cis_5_2_4_9_owner.stdout }}

    - name: "5.2.4.9 | REMEDIATE | Fix audit tool ownership"
      ansible.builtin.shell: chown root /usr/sbin/*audit* 2>/dev/null || true
      when:
        - freebsd_cis_remediate | bool
        - cis_5_2_4_9_owner.stdout | trim != ''
      changed_when: true

# ---

- name: "5.2.4.10 | Ensure audit tools belong to group wheel"
  when:
    - "'5.2.4.10' not in active_exceptions"
    - freebsd_cis_level | int >= 2
  tags: [rule_5.2.4.10, level2, section_5, manual]
  block:
    - name: "5.2.4.10 | AUDIT | Check audit tool ownership and group"  # noqa: risky-shell-pipe
      ansible.builtin.shell: >-
        stat -Lf '%N %Lp %Su %Sg' /usr/sbin/*audit* 2>/dev/null
        | grep -Ev -- '^[[:space:]]*[^[:space:]]+[[:space:]]+([0-5][0145][0145])[[:space:]]+root[[:space:]]+wheel[[:space:]]*$' | head -10 || true
      register: cis_5_2_4_10_group
      changed_when: cis_5_2_4_10_group.stdout | trim != ''
      failed_when: false
      check_mode: false

    - name: "5.2.4.10 | AUDIT | Report audit tool group"
      ansible.builtin.debug:
        msg: >-
          {{ 'COMPLIANT: all audit tools are owned root:wheel at mode 555 or more restrictive'
             if cis_5_2_4_10_group.stdout | trim == ''
             else 'NON-COMPLIANT: audit tools with wrong owner/group/mode found' }}

    - name: "5.2.4.10 | REMEDIATE | Fix audit tool owner, group, and write bits"
      ansible.builtin.shell: chown root:wheel /usr/sbin/*audit* && chmod a-w /usr/sbin/*audit* 2>/dev/null || true
      when:
        - freebsd_cis_remediate | bool
        - cis_5_2_4_10_group.stdout | trim != ''
      changed_when: true

# =============================================================
# 5.3 Configure Integrity Checking
# =============================================================

- name: "5.3.1 | Ensure AIDE is installed"
  when: "'5.3.1' not in active_exceptions"
  tags: [rule_5.3.1, level1, section_5, manual]
  block:
    - name: "5.3.1 | AUDIT | Check if aide package is installed"
      ansible.builtin.command: pkg query -g %n 'aide*'
      register: cis_5_3_1_aide
      changed_when: cis_5_3_1_aide.stdout | trim == ''
      failed_when: false
      check_mode: false

    - name: "5.3.1 | AUDIT | Report AIDE installation state"
      ansible.builtin.debug:
        msg: >-
          {{ 'COMPLIANT: AIDE is installed — ' ~ cis_5_3_1_aide.stdout | trim
             if cis_5_3_1_aide.stdout | trim != ''
             else 'NON-COMPLIANT: AIDE is not installed — file integrity monitoring is not available' }}

    - name: "5.3.1 | REMEDIATE | Install AIDE"
      ansible.builtin.command: pkg install -y aide
      when:
        - freebsd_cis_remediate | bool
        - cis_5_3_1_aide.stdout | trim == ''
      changed_when: true

    - name: "5.3.1 | REMEDIATE | Initialize AIDE database"
      ansible.builtin.command: aide --init
      args:
        creates: /var/lib/aide/aide.db.new.gz
      when:
        - freebsd_cis_remediate | bool
        - cis_5_3_1_aide.stdout | trim == ''

    - name: "5.3.1 | REMEDIATE | Move AIDE database into place"
      ansible.builtin.command: mv /var/lib/aide/aide.db.new.gz /var/lib/aide/aide.db.gz
      args:
        creates: /var/lib/aide/aide.db.gz
        removes: /var/lib/aide/aide.db.new.gz
      when:
        - freebsd_cis_remediate | bool
        - cis_5_3_1_aide.stdout | trim == ''

# ---

- name: "5.3.2 | Ensure filesystem integrity is regularly checked"
  when: "'5.3.2' not in active_exceptions"
  tags: [rule_5.3.2, level1, section_5, manual]
  block:
    - name: "5.3.2 | AUDIT | Check root crontab for aide --check or --update"  # noqa: risky-shell-pipe
      ansible.builtin.shell: >-
        crontab -l -u root 2>/dev/null
        | grep -Es 'aide[[:space:]]+(--?[A-Za-z]+[[:space:]]+)*(--check|--update)([[:space:]]|$)' || true
      register: cis_5_3_2_cron
      changed_when: cis_5_3_2_cron.stdout | trim == ''
      failed_when: false
      check_mode: false

    - name: "5.3.2 | AUDIT | Report AIDE cron state"
      ansible.builtin.debug:
        msg: >-
          {{ 'COMPLIANT: AIDE integrity check is scheduled in root crontab — ' ~ cis_5_3_2_cron.stdout
             if cis_5_3_2_cron.stdout | trim != ''
             else 'NON-COMPLIANT: no AIDE cron job found in root crontab — filesystem integrity is not periodically verified' }}

    - name: "5.3.2 | REMEDIATE | Add AIDE daily check to root crontab"
      ansible.builtin.cron:
        name: "CIS 5.3.2 AIDE daily filesystem integrity check"
        user: root
        special_time: daily
        job: "/usr/bin/lockf -s -t 0 /var/run/aide.lock /usr/local/bin/aide --check"
        state: present
      when:
        - freebsd_cis_remediate | bool
        - cis_5_3_2_cron.stdout | trim == ''
