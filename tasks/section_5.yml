---
# FreeBSD 14 CIS Benchmark v1.0.1
# Section 5 — Logging and Auditing
# Controls: 5.1.1.1 – 5.3.2
# lint-clean: production profile

# =============================================================
# 5.1 Configure Logging
# 5.1.1 Configure syslog
# =============================================================

- name: "5.1.1.1 | Ensure syslog is installed"
  when: "'5.1.1.1' not in active_exceptions"
  tags: [rule_5.1.1.1, level1, section_5, manual]
  block:
    - name: "5.1.1.1 | AUDIT | Check syslogd binary and rc.d script are present"
      ansible.builtin.command: >-
        /bin/sh -c 'test -x /usr/sbin/syslogd && test -x /etc/rc.d/syslogd'
      register: cis_5_1_1_1_syslogd
      changed_when: cis_5_1_1_1_syslogd.rc != 0
      failed_when: false
      check_mode: false

    - name: "5.1.1.1 | AUDIT | Report syslogd installed state"
      ansible.builtin.debug:
        msg: >-
          {{ 'COMPLIANT: syslogd binary and rc.d service script are present'
             if cis_5_1_1_1_syslogd.rc == 0
             else 'NON-COMPLIANT: syslogd binary or rc.d service script is missing' }}

    - name: "5.1.1.1 | REMEDIATE | Report manual remediation required"
      ansible.builtin.debug:
        msg: >-
          REMEDIATION SKIPPED: syslogd is a FreeBSD base component — restore
          /usr/sbin/syslogd and /etc/rc.d/syslogd from a trusted base system
          source before re-running this audit.
      when:
        - freebsd_cis_remediate | bool
        - cis_5_1_1_1_syslogd.rc != 0

# ---

- name: "5.1.1.2 | Ensure syslogd service is enabled"
  when: "'5.1.1.2' not in active_exceptions"
  tags: [rule_5.1.1.2, level1, section_5, manual]
  block:
    - name: "5.1.1.2 | AUDIT | Check syslogd_enable rc.conf setting"
      ansible.builtin.command: sysrc -q -n syslogd_enable
      register: cis_5_1_1_2_syslogd
      changed_when: cis_5_1_1_2_syslogd.stdout | trim | upper != 'YES'
      failed_when: false
      check_mode: false

    - name: "5.1.1.2 | AUDIT | Report syslogd enabled state"
      ansible.builtin.debug:
        msg: >-
          {{ 'COMPLIANT: syslogd_enable is YES'
             if cis_5_1_1_2_syslogd.stdout | trim | upper == 'YES'
             else 'NON-COMPLIANT: syslogd_enable is not YES — syslogd will not start on boot' }}

    - name: "5.1.1.2 | REMEDIATE | Enable syslogd at boot"
      ansible.builtin.service:
        name: syslogd
        enabled: true
      when:
        - freebsd_cis_remediate | bool
        - cis_5_1_1_2_syslogd.stdout | trim | upper != 'YES'

# ---

- name: "5.1.1.3 | Ensure syslogd default file permissions are configured"
  when: "'5.1.1.3' not in active_exceptions"
  tags: [rule_5.1.1.3, level1, section_5, manual]
  block:
    - name: "5.1.1.3 | AUDIT | Check newsyslog.conf for modes more permissive than 640"  # noqa: risky-shell-pipe
      ansible.builtin.shell: >-
        awk '!/^[[:space:]]*(#|$)/{m=($2~/:/)?$3:$2; gsub(/^0+/,"",m);
          if(length(m)==3 && (substr(m,2,1)~/[2367]/ || substr(m,3,1)!="0")) print}'
        /etc/newsyslog.conf 2>/dev/null || true
      register: cis_5_1_1_3_perms
      changed_when: cis_5_1_1_3_perms.stdout | trim != ''
      failed_when: false
      check_mode: false

    - name: "5.1.1.3 | AUDIT | Report newsyslog.conf permission state"
      ansible.builtin.debug:
        msg: >-
          {{ 'COMPLIANT: all newsyslog.conf log modes are 640 or more restrictive'
             if cis_5_1_1_3_perms.stdout | trim == ''
             else 'NON-COMPLIANT: review the following newsyslog.conf entries — modes are more permissive than 640' }}

    - name: "5.1.1.3 | AUDIT | Show entries requiring review"
      ansible.builtin.debug:
        msg: "{{ ['Entries to review:'] + cis_5_1_1_3_perms.stdout_lines }}"
      when: cis_5_1_1_3_perms.stdout | trim != ''

# ---

- name: "5.1.1.4 | Ensure logging is configured"
  when: "'5.1.1.4' not in active_exceptions"
  tags: [rule_5.1.1.4, level1, section_5, manual]
  block:
    - name: "5.1.1.4 | AUDIT | List syslog.conf files present"
      ansible.builtin.shell: >-
        ls -1 /etc/syslog.conf 2>/dev/null;
        ls -1 /etc/syslog.d/*.conf 2>/dev/null || true;
        ls -1 /usr/local/etc/syslog.d/*.conf 2>/dev/null || true
      register: cis_5_1_1_4_conf
      changed_when: false
      failed_when: false
      check_mode: false

    - name: "5.1.1.4 | AUDIT | Check that /etc/syslog.conf exists"
      ansible.builtin.stat:
        path: /etc/syslog.conf
      register: cis_5_1_1_4_syslog_conf
      check_mode: false

    - name: "5.1.1.4 | AUDIT | Report syslog.conf state"
      ansible.builtin.debug:
        msg: >-
          {{ 'COMPLIANT: /etc/syslog.conf exists — review it manually to verify appropriate logging rules'
             if cis_5_1_1_4_syslog_conf.stat.exists
             else 'NON-COMPLIANT: /etc/syslog.conf does not exist — syslog logging may not be configured' }}

    - name: "5.1.1.4 | AUDIT | Show config files found"
      ansible.builtin.debug:
        msg: "{{ ['syslog config files found:'] + cis_5_1_1_4_conf.stdout_lines }}"
      when: cis_5_1_1_4_conf.stdout | trim != ''

    - name: "5.1.1.4 | REMEDIATE | Warn — syslog.conf absent, manual action required"
      ansible.builtin.debug:
        msg: >-
          REMEDIATION SKIPPED: /etc/syslog.conf is absent. On a stock FreeBSD
          installation syslog.conf should be present. Restore it from a trusted
          base system source and re-run the audit.
      when:
        - freebsd_cis_remediate | bool
        - not cis_5_1_1_4_syslog_conf.stat.exists

# ---

- name: "5.1.1.5 | Ensure syslog is configured to send logs to a remote log host"
  when: "'5.1.1.5' not in active_exceptions"
  tags: [rule_5.1.1.5, level1, section_5, manual]
  block:
    # --- Detection: syslog @remote entries ---
    - name: "5.1.1.5 | AUDIT | Check syslog.conf files for remote forwarding entries"
      ansible.builtin.shell: >-
        { grep -E '^[[:space:]]*[^#[:space:]].*@' /etc/syslog.conf 2>/dev/null || true; }
        { grep -rE '^[[:space:]]*[^#[:space:]].*@' /etc/syslog.d/ 2>/dev/null || true; }
        { grep -rE '^[[:space:]]*[^#[:space:]].*@' /usr/local/etc/syslog.d/ 2>/dev/null || true; }
      register: cis_5_1_1_5_syslog_remote
      changed_when: false
      failed_when: false
      check_mode: false

    # --- Detection: Splunk Universal Forwarder ---
    - name: "5.1.1.5 | AUDIT | Check for Splunk Universal Forwarder process"
      ansible.builtin.command: pgrep -x splunkd
      register: cis_5_1_1_5_splunk
      changed_when: false
      failed_when: false
      check_mode: false

    # --- Detection: rsyslog or syslog-ng installed ---
    - name: "5.1.1.5 | AUDIT | Check for rsyslog or syslog-ng packages"  # noqa: risky-shell-pipe
      ansible.builtin.shell: >-
        pkg query '%n-%v' 2>/dev/null | grep -E '^(rsyslog|syslog-ng)-' | head -5 || true
      register: cis_5_1_1_5_alt_daemon
      changed_when: false
      failed_when: false
      check_mode: false

    # --- Aggregate ---
    - name: "5.1.1.5 | AUDIT | Evaluate overall remote logging state"
      ansible.builtin.set_fact:
        cis_5_1_1_5_remote_configured: >-
          {{
            (cis_5_1_1_5_syslog_remote.stdout | trim != '') or
            (cis_5_1_1_5_splunk.rc == 0) or
            (cis_5_1_1_5_alt_daemon.stdout | trim != '')
          }}
      changed_when: >-
        not (
          (cis_5_1_1_5_syslog_remote.stdout | trim != '') or
          (cis_5_1_1_5_splunk.rc == 0) or
          (cis_5_1_1_5_alt_daemon.stdout | trim != '')
        )

    - name: "5.1.1.5 | AUDIT | Report remote logging state"
      ansible.builtin.debug:
        msg: >-
          {% if cis_5_1_1_5_syslog_remote.stdout | trim != '' %}
          COMPLIANT: syslog forwarding to remote host configured
          {% elif cis_5_1_1_5_splunk.rc == 0 %}
          COMPLIANT: Splunk Universal Forwarder (splunkd) is running — remote log shipping is active and satisfies the intent of this control
          {% elif cis_5_1_1_5_alt_daemon.stdout | trim != '' %}
          COMPLIANT: alternative remote syslog daemon installed ({{ cis_5_1_1_5_alt_daemon.stdout | trim }}) — verify it is actively forwarding logs offhost
          {% else %}
          NON-COMPLIANT: no remote logging mechanism detected (no syslog @remote entry, no Splunk forwarder, no rsyslog/syslog-ng)
          {% endif %}

    - name: "5.1.1.5 | AUDIT | Show syslog remote forwarding entries"
      ansible.builtin.debug:
        msg: "{{ ['syslog remote forwarding entries:'] + cis_5_1_1_5_syslog_remote.stdout_lines }}"
      when: cis_5_1_1_5_syslog_remote.stdout | trim != ''

    - name: "5.1.1.5 | REMEDIATE | Add remote log host entry to syslog.conf"
      ansible.builtin.lineinfile:
        path: /etc/syslog.conf
        regexp: '^\*\.\*\s+@'
        line: "*.* @{{ freebsd_cis_syslog_remote_host }}"
        create: false
      when:
        - freebsd_cis_remediate | bool
        - not cis_5_1_1_5_remote_configured
        - freebsd_cis_syslog_remote_host | length > 0
      notify: restart syslogd

    - name: "5.1.1.5 | REMEDIATE | Warn — no remote logging and freebsd_cis_syslog_remote_host is unset"
      ansible.builtin.debug:
        msg: >-
          REMEDIATION SKIPPED: no remote logging detected but freebsd_cis_syslog_remote_host is not set.
          Configure syslog remote forwarding, install Splunk UF, or set freebsd_cis_syslog_remote_host
          to enable automated remediation.
      when:
        - freebsd_cis_remediate | bool
        - not cis_5_1_1_5_remote_configured
        - freebsd_cis_syslog_remote_host | length == 0

# ---

- name: "5.1.1.6 | Ensure rsyslog is not configured to receive logs from a remote client"
  when: "'5.1.1.6' not in active_exceptions"
  tags: [rule_5.1.1.6, level1, section_5, manual]
  block:
    - name: "5.1.1.6 | AUDIT | Check syslogd_flags for -s flag"
      ansible.builtin.command: sysrc -q -n syslogd_flags
      register: cis_5_1_1_6_flags
      changed_when: false
      failed_when: false
      check_mode: false

    - name: "5.1.1.6 | AUDIT | Evaluate -s flag presence"
      ansible.builtin.set_fact:
        cis_5_1_1_6_secure: "{{ '-s' in (cis_5_1_1_6_flags.stdout | default('')) }}"

    - name: "5.1.1.6 | AUDIT | Report syslogd remote receive state"
      ansible.builtin.debug:
        msg: >-
          {{ 'COMPLIANT: syslogd_flags contains -s — not accepting remote logs'
             if cis_5_1_1_6_secure
             else 'NON-COMPLIANT: syslogd_flags does not contain -s — may accept remote logs' }}

    - name: "5.1.1.6 | REMEDIATE | Add -s flag to syslogd_flags"
      ansible.builtin.command: sysrc syslogd_flags+=" -s"
      when:
        - freebsd_cis_remediate | bool
        - not cis_5_1_1_6_secure
      changed_when: true
      notify: restart syslogd

# =============================================================
# 5.1.2 Ensure newsyslog is configured
# =============================================================

- name: "5.1.2 | Ensure newsyslog is configured"
  when: "'5.1.2' not in active_exceptions"
  tags: [rule_5.1.2, level1, section_5, manual]
  block:
    - name: "5.1.2 | AUDIT | Check newsyslog.conf exists"
      ansible.builtin.stat:
        path: /etc/newsyslog.conf
      register: cis_5_1_2_newsyslog
      check_mode: false

    - name: "5.1.2 | AUDIT | Report newsyslog.conf state"
      ansible.builtin.debug:
        msg: >-
          {{ 'COMPLIANT: /etc/newsyslog.conf exists — review content manually to verify rotation meets site policy'
             if cis_5_1_2_newsyslog.stat.exists
             else 'NON-COMPLIANT: /etc/newsyslog.conf does not exist — log rotation is not configured' }}

# =============================================================
# 5.1.3 Ensure all logfiles have appropriate access configured
# =============================================================

- name: "5.1.3 | Ensure all logfiles have appropriate access configured"
  when: "'5.1.3' not in active_exceptions"
  tags: [rule_5.1.3, level1, section_5, manual]
  block:

    - name: "5.1.3 | AUDIT | Find log files with world-readable permissions"  # noqa: risky-shell-pipe
      ansible.builtin.shell: >-
        find /var/log -maxdepth 1 -type f -perm /o+r -exec stat -Lf "%N %Lp %Su %Sg" {} + 2>/dev/null | head -40 || true
      register: cis_5_1_3_world_read
      changed_when: cis_5_1_3_world_read.stdout | trim != ''
      failed_when: false
      check_mode: false

    - name: "5.1.3 | AUDIT | Find log files not owned by root"  # noqa: risky-shell-pipe
      ansible.builtin.shell: >-
        find /var/log -maxdepth 1 -type f ! -user root -exec stat -Lf "%N %Su %Sg" {} + 2>/dev/null | head -40 || true
      register: cis_5_1_3_owner
      changed_when: cis_5_1_3_owner.stdout | trim != ''
      failed_when: false
      check_mode: false

    - name: "5.1.3 | AUDIT | Report log file access state"
      ansible.builtin.debug:
        msg: >-
          {{ 'COMPLIANT: no obviously mis-permissioned log files found in /var/log'
             if (cis_5_1_3_world_read.stdout | trim == '') and (cis_5_1_3_owner.stdout | trim == '')
             else 'NON-COMPLIANT: log files found with excessive permissions or wrong owner — review details' }}

    - name: "5.1.3 | AUDIT | Show world-readable log files"
      ansible.builtin.debug:
        msg: "{{ ['World-readable log files:'] + cis_5_1_3_world_read.stdout_lines }}"
      when: cis_5_1_3_world_read.stdout | trim != ''

    - name: "5.1.3 | AUDIT | Show non-root-owned log files"
      ansible.builtin.debug:
        msg: "{{ ['Non-root-owned log files:'] + cis_5_1_3_owner.stdout_lines }}"
      when: cis_5_1_3_owner.stdout | trim != ''

    - name: "5.1.3 | REMEDIATE | Fix permissions on key log files"
      ansible.builtin.file:
        path: "{{ item }}"
        owner: root
        group: wheel
        mode: '0640'
      loop: "{{ freebsd_cis_log_files_to_fix }}"
      loop_control:
        label: "{{ item }}"
      failed_when: false
      when:
        - freebsd_cis_remediate | bool
        - freebsd_cis_log_files_to_fix | length > 0

# =============================================================
# 5.2 Configure System Accounting (auditd)
# 5.2.1 Ensure auditing is enabled
# =============================================================

- name: "5.2.1.1 | Ensure auditd service is enabled"
  when:
    - "'5.2.1.1' not in active_exceptions"
    - freebsd_cis_level | int >= 2
  tags: [rule_5.2.1.1, level2, section_5, manual]
  block:
    - name: "5.2.1.1 | AUDIT | Check auditd_enable rc.conf setting"
      ansible.builtin.command: sysrc -q -n auditd_enable
      register: cis_5_2_1_1_auditd
      changed_when: cis_5_2_1_1_auditd.stdout | trim | upper != 'YES'
      failed_when: false
      check_mode: false

    - name: "5.2.1.1 | AUDIT | Report auditd enabled state"
      ansible.builtin.debug:
        msg: >-
          {{ 'COMPLIANT: auditd_enable is YES'
             if cis_5_2_1_1_auditd.stdout | trim | upper == 'YES'
             else 'NON-COMPLIANT: auditd_enable is not YES — kernel auditing will not start on boot' }}

    - name: "5.2.1.1 | REMEDIATE | Enable and start auditd"
      ansible.builtin.service:
        name: auditd
        state: started
        enabled: true
      when:
        - freebsd_cis_remediate | bool
        - cis_5_2_1_1_auditd.stdout | trim | upper != 'YES'

# =============================================================
# 5.2.2 Configure Data Retention
# =============================================================

- name: "5.2.2.1 | Ensure audit log storage size is configured"
  when:
    - "'5.2.2.1' not in active_exceptions"
    - freebsd_cis_level | int >= 2
  tags: [rule_5.2.2.1, level2, section_5, manual]
  block:
    - name: "5.2.2.1 | AUDIT | Check filesz in audit_control"
      ansible.builtin.command: grep "^filesz:" /etc/security/audit_control
      register: cis_5_2_2_1_filesz
      changed_when: cis_5_2_2_1_filesz.rc != 0
      failed_when: false
      check_mode: false

    - name: "5.2.2.1 | AUDIT | Report filesz state"
      ansible.builtin.debug:
        msg: >-
          {{ 'COMPLIANT: filesz is configured — ' ~ cis_5_2_2_1_filesz.stdout
             if cis_5_2_2_1_filesz.rc == 0
             else 'NON-COMPLIANT: filesz directive not found in /etc/security/audit_control' }}

    - name: "5.2.2.1 | REMEDIATE | Set filesz in audit_control"
      ansible.builtin.lineinfile:
        path: /etc/security/audit_control
        regexp: '^filesz:'
        line: "filesz:{{ freebsd_cis_audit_filesz }}"
        create: false
        backup: true
      when:
        - freebsd_cis_remediate | bool
        - cis_5_2_2_1_filesz.rc != 0

# ---

- name: "5.2.2.2 | Ensure audit logs are not automatically deleted"
  when:
    - "'5.2.2.2' not in active_exceptions"
    - freebsd_cis_level | int >= 2
  tags: [rule_5.2.2.2, level2, section_5, manual]
  block:
    - name: "5.2.2.2 | AUDIT | Check expire-after in audit_control"
      ansible.builtin.command: grep "^expire-after:" /etc/security/audit_control
      register: cis_5_2_2_2_expire
      changed_when: cis_5_2_2_2_expire.rc != 0
      failed_when: false
      check_mode: false

    - name: "5.2.2.2 | AUDIT | Report expire-after state"
      ansible.builtin.debug:
        msg: >-
          {{ 'COMPLIANT: expire-after is configured — ' ~ cis_5_2_2_2_expire.stdout
             if cis_5_2_2_2_expire.rc == 0
             else 'NON-COMPLIANT: expire-after directive not found in /etc/security/audit_control — logs may accumulate without bound' }}

    - name: "5.2.2.2 | REMEDIATE | Set expire-after in audit_control"
      ansible.builtin.lineinfile:
        path: /etc/security/audit_control
        regexp: '^expire-after:'
        line: "expire-after:{{ freebsd_cis_audit_expire_after }}"
        create: false
        backup: true
      when:
        - freebsd_cis_remediate | bool
        - cis_5_2_2_2_expire.rc != 0

# =============================================================
# 5.2.3 Configure auditd rules
# =============================================================

- name: "5.2.3.1 | Ensure actions as another user are always logged"
  when:
    - "'5.2.3.1' not in active_exceptions"
    - freebsd_cis_level | int >= 2
  tags: [rule_5.2.3.1, level2, section_5, manual]
  block:
    - name: "5.2.3.1 | AUDIT | Check audit_control flags for aa"
      ansible.builtin.command: grep "^flags:.*aa" /etc/security/audit_control
      register: cis_5_2_3_1_flags
      changed_when: cis_5_2_3_1_flags.rc != 0
      failed_when: false
      check_mode: false

    - name: "5.2.3.1 | AUDIT | Report aa flag state"
      ansible.builtin.debug:
        msg: >-
          {{ 'COMPLIANT: audit flags include aa — ' ~ cis_5_2_3_1_flags.stdout
             if cis_5_2_3_1_flags.rc == 0
             else 'NON-COMPLIANT: aa flag not found in audit_control flags — sudo actions may not be audited' }}

    - name: "5.2.3.1 | REMEDIATE | Read current audit_control flags line"
      ansible.builtin.command: grep "^flags:" /etc/security/audit_control
      register: cis_5_2_3_1_flags_current
      changed_when: false
      failed_when: false
      check_mode: false
      when:
        - freebsd_cis_remediate | bool
        - cis_5_2_3_1_flags.rc != 0

    - name: "5.2.3.1 | REMEDIATE | Build merged flags line including aa"
      ansible.builtin.set_fact:
        cis_5_2_3_1_new_flags: >-
          {{ ((cis_5_2_3_1_flags_current.stdout | default('')
               | regex_replace('^flags:[[:space:]]*', '')
               | split(',')
               | map('trim')
               | reject('equalto', '')
               | list)
              + ['aa'])
             | unique | join(',') }}
      when:
        - freebsd_cis_remediate | bool
        - cis_5_2_3_1_flags.rc != 0

    - name: "5.2.3.1 | REMEDIATE | Ensure aa flag in audit_control flags line"
      ansible.builtin.lineinfile:
        path: /etc/security/audit_control
        regexp: '^flags:'
        line: "flags:{{ cis_5_2_3_1_new_flags }}"
        insertbefore: '^naflags:'
        backup: true
      when:
        - freebsd_cis_remediate | bool
        - cis_5_2_3_1_flags.rc != 0

# ---

- name: "5.2.3.2 | Ensure events that modify the sudo log file are collected"
  when:
    - "'5.2.3.2' not in active_exceptions"
    - freebsd_cis_level | int >= 2
  tags: [rule_5.2.3.2, level2, section_5, manual]
  block:
    - name: "5.2.3.2 | AUDIT | Check audit_control flags for file event classes"
      ansible.builtin.command: grep "^flags:" /etc/security/audit_control
      register: cis_5_2_3_2_flags
      changed_when: false
      failed_when: false
      check_mode: false

    - name: "5.2.3.2 | AUDIT | Evaluate required file event flags"
      ansible.builtin.set_fact:
        cis_5_2_3_2_missing: >-
          {{
            ['fa', 'fc', 'fd', 'fm', 'fr', 'fw']
            | reject('in', cis_5_2_3_2_flags.stdout | default(''))
            | list
          }}

    - name: "5.2.3.2 | AUDIT | Report file event flags state"
      ansible.builtin.debug:
        msg: >-
          {{ 'COMPLIANT: all required file event flags present — ' ~ cis_5_2_3_2_flags.stdout
             if cis_5_2_3_2_missing | length == 0
             else 'NON-COMPLIANT: missing audit flags: ' ~ (cis_5_2_3_2_missing | join(', ')) }}

    - name: "5.2.3.2 | REMEDIATE | Build merged flags line for audit_control"
      ansible.builtin.set_fact:
        cis_5_2_3_2_new_flags: >-
          {{ ((cis_5_2_3_2_flags.stdout
               | regex_replace('^flags:[[:space:]]*', '')
               | split(',')
               | map('trim')
               | reject('equalto', '')
               | list)
              + cis_5_2_3_2_missing)
             | unique | join(',') }}
      when:
        - freebsd_cis_remediate | bool
        - cis_5_2_3_2_missing | length > 0

    - name: "5.2.3.2 | REMEDIATE | Ensure required file event flags in audit_control"
      ansible.builtin.lineinfile:
        path: /etc/security/audit_control
        regexp: '^flags:'
        line: "flags:{{ cis_5_2_3_2_new_flags }}"
        insertbefore: '^naflags:'
        backup: true
      when:
        - freebsd_cis_remediate | bool
        - cis_5_2_3_2_missing | length > 0

