---
# FreeBSD 14 CIS Benchmark v1.0.1 — Task Orchestrator

- name: "Initialize | Validate exclusion variable types"
  ansible.builtin.assert:
    that:
      - (freebsd_cis_global_exclusions | type_debug) == 'list'
      - (freebsd_cis_local_exclusions | type_debug) == 'list'
      - (freebsd_cis_global_exclusions | map('type_debug') | unique | difference(['str']) | length) == 0
      - (freebsd_cis_local_exclusions | map('type_debug') | unique | difference(['str']) | length) == 0
    fail_msg: >-
      freebsd_cis_global_exclusions and freebsd_cis_local_exclusions must both be YAML lists
      containing only string rule IDs. Got container types:
      global={{ freebsd_cis_global_exclusions | type_debug }},
      local={{ freebsd_cis_local_exclusions | type_debug }}.
      Element types must all be 'str'; define them like ["1.1.1.1"] and not as dicts,
      integers, or nested lists.
  tags: [always]

- name: "Initialize | Merge exclusion lists"
  ansible.builtin.set_fact:
    active_exclusions: "{{ (freebsd_cis_global_exclusions + freebsd_cis_local_exclusions) | unique }}"
  tags: [always]

- name: "Initialize | Warn — freebsd_cis_audit_expire_after is a small size-only value"
  ansible.builtin.debug:
    msg: >-
      SECURITY WARNING: freebsd_cis_audit_expire_after is '{{ freebsd_cis_audit_expire_after }}',
      a size-only threshold below 100 MiB. On a busy or actively probed host, BSM audit logs can
      exceed this within minutes, causing auditd to auto-delete forensic evidence before it is
      forwarded or reviewed. Consider a value such as '60d and 512M' so logs survive long enough
      for review or forwarding.
  when: >-
    (freebsd_cis_audit_expire_after | trim | regex_search('^[0-9]+[BKMbkm]$') is not none) and
    (((freebsd_cis_audit_expire_after | trim | regex_replace('[^0-9]', '') | int) *
    (1048576 if (freebsd_cis_audit_expire_after | trim | lower | regex_search('m$') is not none)
    else 1024 if (freebsd_cis_audit_expire_after | trim | lower | regex_search('k$') is not none)
    else 1)) < 104857600)
  tags: [always]

- name: "Section 1 | Initial Setup"
  ansible.builtin.import_tasks: section_1.yml
  tags: section_1

- name: "Section 2 | Services"
  ansible.builtin.import_tasks: section_2.yml
  tags: section_2

- name: "Section 3 | Network"
  ansible.builtin.import_tasks: section_3.yml
  tags: section_3

- name: "Section 4 | Access, Authentication and Authorization"
  ansible.builtin.import_tasks: section_4.yml
  tags: section_4

- name: "Section 5 | Logging and Auditing"
  ansible.builtin.import_tasks: section_5.yml
  tags: section_5

- name: "Section 6 | System Maintenance"
  ansible.builtin.import_tasks: section_6.yml
  tags: section_6
